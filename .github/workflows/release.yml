name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: clock-linux-x64
            asset_name: clock-linux-x64.tar.gz
          - os: windows-latest
            artifact_name: clock-windows-x64
            asset_name: clock-windows-x64.zip
          - os: macos-latest
            artifact_name: clock-macos-x64
            asset_name: clock-macos-x64.tar.gz

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build Workspace
      run: cargo build --release

    - name: Organize Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        New-Item -ItemType Directory -Force -Path "dist/api/OpenGL/3.3"
        New-Item -ItemType Directory -Force -Path "dist/api/OpenGLES/3.0"
        
        Get-ChildItem "target/release/" -Filter "Clock.exe" | Copy-Item -Destination "dist/"
        
        Get-ChildItem "target/release/" -Filter "*opengl*.dll" | Copy-Item -Destination "dist/api/OpenGL/3.3/"
        
        Compress-Archive -Path dist/* -DestinationPath ${{ matrix.asset_name }}
      shell: pwsh

    - name: Organize Artifacts (Linux / macOS)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p dist/api/OpenGL/3.3
        mkdir -p dist/api/OpenGLES/3.0
        
        cp target/release/[Cc]lock dist/ 2>/dev/null || cp target/release/Clock dist/
        
        cp target/release/*opengl*.so dist/api/OpenGL/3.3/ 2>/dev/null || true
        cp target/release/*opengl*.dylib dist/api/OpenGL/3.3/ 2>/dev/null || true
        
        tar -czvf ${{ matrix.asset_name }} -C dist .

    - name: Upload Binaries to Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.asset_name }}
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}